name: Android CI/CD - Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "Gradle wrapper not found, generating wrapper..."
            gradle wrapper --gradle-version 9.3.1
            chmod +x gradlew
          fi

      - name: Generate Dummy Debug Keystore
        run: |
          if [ ! -f debug.keystore ]; then
            echo "Generating dummy debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "debug.keystore already exists."
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: abraham-decor-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
